name: Stock Daily Push

on:
  schedule:
    - cron: '25 1 * * 1-5'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Get Stock Data & Analyze
        id: stock
        run: |
          # 获取露笑科技(002617)实时数据
          STOCK_DATA=$(curl -s "https://push2.eastmoney.com/api/qt/stock/get?secid=0.002617&fields=f43,f44,f45,f46,f47,f48,f57,f58,f169,f170,f171")
          
          # 解析基础数据
          PRICE=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['data']['f43']/100,2) if d.get('data') else 0)")
          CHANGEPCT=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['data']['f170']/100,2) if d.get('data') else 0)")
          OPEN=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['data']['f46']/100,2) if d.get('data') else 0)")
          HIGH=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['data']['f44']/100,2) if d.get('data') else 0)")
          LOW=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['data']['f45']/100,2) if d.get('data') else 0)")
          NAME=$(echo $STOCK_DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['f58'] if d.get('data') else 'Unknown')")
          
          # 动态计算支撑位和压力位
          SUPPORT1=$(python3 -c "print(round($PRICE * 0.95, 2))")
          SUPPORT2=$(python3 -c "print(round($PRICE * 0.90, 2))")
          RESISTANCE=$(python3 -c "print(round($PRICE * 1.05, 2))")
          
          echo "PRICE=$PRICE" >> $GITHUB_OUTPUT
          echo "CHANGEPCT=$CHANGEPCT" >> $GITHUB_OUTPUT
          echo "OPEN=$OPEN" >> $GITHUB_OUTPUT
          echo "HIGH=$HIGH" >> $GITHUB_OUTPUT
          echo "LOW=$LOW" >> $GITHUB_OUTPUT
          echo "NAME=$NAME" >> $GITHUB_OUTPUT
          echo "SUPPORT1=$SUPPORT1" >> $GITHUB_OUTPUT
          echo "SUPPORT2=$SUPPORT2" >> $GITHUB_OUTPUT
          echo "RESISTANCE=$RESISTANCE" >> $GITHUB_OUTPUT
          
          # 生成分析建议
          if (( $(echo "$CHANGEPCT > 2" | bc -l) )); then
            echo "SUGGESTION=可以考虑适量加仓" >> $GITHUB_OUTPUT
            echo "REASON=放量上涨" >> $GITHUB_OUTPUT
          elif (( $(echo "$CHANGEPCT < -2" | bc -l) )); then
            echo "SUGGESTION=建议观望或减仓" >> $GITHUB_OUTPUT
            echo "REASON=放量下跌，注意风险" >> $GITHUB_OUTPUT
          else
            echo "SUGGESTION=谨慎观望" >> $GITHUB_OUTPUT
            echo "REASON=等待更明确信号" >> $GITHUB_OUTPUT
          fi

      - name: Send WeChat Push
        env:
          PRICE: ${{ steps.stock.outputs.PRICE }}
          CHANGEPCT: ${{ steps.stock.outputs.CHANGEPCT }}
          OPEN: ${{ steps.stock.outputs.OPEN }}
          HIGH: ${{ steps.stock.outputs.HIGH }}
          LOW: ${{ steps.stock.outputs.LOW }}
          NAME: ${{ steps.stock.outputs.NAME }}
          SUPPORT1: ${{ steps.stock.outputs.SUPPORT1 }}
          SUPPORT2: ${{ steps.stock.outputs.SUPPORT2 }}
          RESISTANCE: ${{ steps.stock.outputs.RESISTANCE }}
          SUGGESTION: ${{ steps.stock.outputs.SUGGESTION }}
          REASON: ${{ steps.stock.outputs.REASON }}
        run: |
          # 构建消息内容（用简单格式避免YAML问题）
          MSG="今日行情：当前价${PRICE}元，涨跌幅${CHANGEPCT}%。操作建议：${SUGGESTION}，原因：${REASON}。关键位置：第一支撑${SUPPORT1}元，强支撑${SUPPORT2}元，压力位${RESISTANCE}元。"
          
          curl -X POST "https://sctapi.ftqq.com/SCT333369TDkou0QECM7WdHU4UOcLoELoW.send" \
            -d "title=📊 ${NAME}(002617)每日分析 - $(date '+%m/%d %H:%M')" \
            -d "desp=${MSG}"

